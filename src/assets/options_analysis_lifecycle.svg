    <text x="333" y="108" style="fill:rgb(74, 59, 48);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Create</text>

    <line x1="406" y1="101" x2="436" y2="101" stroke="#b89a86" stroke-width="2" marker-end="url(#arm)" style="fill:rgb(74, 59, 48);stroke:rgb(184, 154, 134);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto"/>
    <rect x="436" y="64" width="120" height="74" rx="13" fill="#fdf6e9" stroke="#d9cbb0" style="fill:rgb(253, 246, 233);stroke:rgb(217, 203, 176);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto"/>
    <text x="496" y="108" style="fill:rgb(74, 59, 48);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Live</text>

    <line x1="556" y1="101" x2="586" y2="101" stroke="#b89a86" stroke-width="2" marker-end="url(#arm)" style="fill:rgb(74, 59, 48);stroke:rgb(184, 154, 134);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto"/>
    <rect x="586" y="64" width="150" height="74" rx="13" fill="#fdf6e9" stroke="#d9cbb0" style="fill:rgb(253, 246, 233);stroke:rgb(217, 203, 176);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto"/>
    <text x="661" y="108" style="fill:rgb(74, 59, 48);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:18px;font-weight:600;text-anchor:middle;dominant-baseline:auto">Sunset</text>
  </g>

  <text x="498" y="52" text-anchor="middle" font-size="10.5" letter-spacing="1.6" fill="#9a8a7b" font-family="Helvetica, Arial, sans-serif" style="fill:rgb(154, 138, 123);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:10.5px;font-weight:400;text-anchor:middle;dominant-baseline:auto">THE LIFECYCLE</text>

  <!-- faint dashed return from Sunset back to Options analysis, angled into the box -->
  <path d="M 661 142 C 661 206, 195 206, 122 152" fill="none" stroke="#b89a86" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ard)" style="fill:none;stroke:rgb(184, 154, 134);color:rgb(255, 255, 255);stroke-width:1.6px;stroke-dasharray:5px, 4px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <text x="392" y="223" text-anchor="middle" font-size="10.5" fill="#9a8a7b" font-family="Helvetica, Arial, sans-serif" style="fill:rgb(154, 138, 123);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Helvetica, Arial, sans-serif;font-size:10.5px;font-weight:400;text-anchor:middle;dominant-baseline:auto">and again at Sunset, when you weigh a replacement</text>
</svg>