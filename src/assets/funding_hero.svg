<svg viewBox="0 0 840 270" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <!-- LEFT: Treasury Board building (icon band y 60..200, centred x=130) -->
  <g fill="#A8492A">
    <polygon points="130,60 58,100 202,100"/>
    <rect x="58" y="100" width="144" height="12"/>
    <rect x="72" y="112" width="14" height="72"/>
    <rect x="106" y="112" width="14" height="72"/>
    <rect x="140" y="112" width="14" height="72"/>
    <rect x="174" y="112" width="14" height="72"/>
    <rect x="50" y="184" width="160" height="16" rx="2"/>
  </g>

  <!-- CENTRE: the department (icon band y 60..200, centred x=420) -->
  <g fill="#4A3B2E">
    <circle cx="420" cy="95" r="33"/>
    <path d="M 378 200 C 378 128, 462 128, 462 200 Z"/>
  </g>

  <!-- RIGHT: the service (icon band y 60..200, centred x=710) -->
  <g>
    <rect x="632" y="60" width="156" height="140" rx="12" fill="#EFE7D6" stroke="#C9BBA4" stroke-width="2.5"/>
    <rect x="632" y="60" width="156" height="28" rx="12" fill="#C9BBA4"/>
    <circle cx="650" cy="74" r="4" fill="#F6F1E7"/>
    <circle cx="666" cy="74" r="4" fill="#F6F1E7"/>
    <circle cx="682" cy="74" r="4" fill="#F6F1E7"/>
    <rect x="652" y="112" width="116" height="11" rx="5.5" fill="#C9BBA4"/>
    <rect x="652" y="138" width="116" height="11" rx="5.5" fill="#C9BBA4"/>
    <rect x="652" y="164" width="74" height="11" rx="5.5" fill="#A8492A"/>
  </g>

  <!-- ARROW 1: Treasury Board -> department (explicit head, centred in the gap, label well above) -->
  <text x="294" y="111" text-anchor="middle" font-size="12" fill="#A8492A" font-style="italic">funding and permission</text>
  <line x1="240" y1="130" x2="326" y2="130" stroke="#A8492A" stroke-width="4"/>
  <polygon points="324,119 349,130 324,141" fill="#A8492A"/>

  <!-- ARROW 2: department -> service (explicit head, centred in the gap) -->
  <text x="547" y="111" text-anchor="middle" font-size="12" fill="#A8492A" font-style="italic">procurement</text>
  <line x1="492" y1="130" x2="578" y2="130" stroke="#A8492A" stroke-width="4"/>
  <polygon points="576,119 603,130 576,141" fill="#A8492A"/>

  <!-- labels, all on one baseline -->
  <text x="130" y="232" text-anchor="middle" font-size="19" fill="#4A3B2E">Treasury Board</text>
  <text x="420" y="232" text-anchor="middle" font-size="19" fill="#4A3B2E">The department</text>
  <text x="710" y="232" text-anchor="middle" font-size="19" fill="#4A3B2E">The service</text>
</svg>
